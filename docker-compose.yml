version: '3.9'
services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: digitalbank
      POSTGRES_USER: digitalbank
      POSTGRES_PASSWORD: digitalbank
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U digitalbank -d digitalbank']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ['CMD', 'nc', '-z', 'localhost', '2181']
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 10s
      timeout: 10s
      retries: 15

  # --- Application Services ---
  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: config-server
    ports:
      - '8888:8888'
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-gateway
    ports:
      - '8080:8080'
    depends_on:
      - config-server

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-service
    ports:
      - '8081:8081'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digitalbank
      SPRING_DATASOURCE_USERNAME: digitalbank
      SPRING_DATASOURCE_PASSWORD: digitalbank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  customer-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: customer-service
    ports:
      - '8082:8082'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digitalbank
      SPRING_DATASOURCE_USERNAME: digitalbank
      SPRING_DATASOURCE_PASSWORD: digitalbank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  account-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: account-service
    ports:
      - '8083:8083'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digitalbank
      SPRING_DATASOURCE_USERNAME: digitalbank
      SPRING_DATASOURCE_PASSWORD: digitalbank
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: transaction-service
    ports:
      - '8084:8084'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digitalbank
      SPRING_DATASOURCE_USERNAME: digitalbank
      SPRING_DATASOURCE_PASSWORD: digitalbank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  transfer-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: transfer-service
    ports:
      - '8085:8085'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digitalbank
      SPRING_DATASOURCE_USERNAME: digitalbank
      SPRING_DATASOURCE_PASSWORD: digitalbank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: notification-service
    ports:
      - '8086:8086'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digitalbank
      SPRING_DATASOURCE_USERNAME: digitalbank
      SPRING_DATASOURCE_PASSWORD: digitalbank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy